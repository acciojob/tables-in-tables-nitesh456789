<!DOCTYPE html>
<html>
<head>
    <title>Nested Tables</title>
</head>

<body>

<table border="1" cellpadding="10">

    <tr>
        <!-- LEFT SIDE -->
        <td>
            <table border="1">
                <tr>
                    <th colspan="2">Nested Table 2</th>
                </tr>
                <tr>
                    <td>Column 1</td>
                    <td>Column 2</td>
                </tr>
                <tr>
                    <td>abc</td>
                    <td>def</td>
                </tr>
            </table>
        </td>

        <!-- RIGHT SIDE -->
        <td>
            <table border="1">
                <tr>
                    <th>Nested Table 1</th>
                </tr>
                <tr>
                    <td>
                        <ul>
                            <li>List item 1</li>
                            <li>List item 2</li>
                            <li>List item 3</li>
                        </ul>
                    </td>
                </tr>
            </table>
        </td>
    </tr>

    <!-- SECOND ROW -->
    <tr>
        <td>
            <table border="1">
                <tr>
                    <th>Nested Table 3</th>
                </tr>
                <tr>
                    <td>Demo Continued</td>
                </tr>
            </table>
        </td>

        <td>
            <table border="1">
                <tr>
                    <th>Nested Table 4</th>
                </tr>
                <tr>
                    <td bgcolor="black">
                        <font color="white">HTML</font>
                    </td>
                </tr>
            </table>
        </td>
    </tr>

</table>

</body>
</html>
